<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASTERN EDITION - Minimalist Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; color: #1a1a1a; background-color: #ffffff; }
        .logo { font-family: 'Playfair Display', serif; letter-spacing: 0.15em; }
        .nav-item { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body class="antialiased">
    <header class="sticky top-0 z-50 bg-white border-b border-gray-100 px-4 py-4 flex items-center justify-between">
        <button class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16m-7 6h7"></path></svg></button>
        <div class="logo text-lg font-medium tracking-widest uppercase text-center">Eastern Edition</div>
        <div class="flex items-center space-x-3">
            <button class="p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></button>
            <button class="p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg></button>
        </div>
    </header>
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-2 lg:grid-cols-3 gap-x-4 gap-y-12">
            <div class="product-card cursor-pointer group">
                <div class="aspect-[4/5] bg-gray-100 mb-4 overflow-hidden"><img src="https://m.en.eastern-edition.com/web/upload/category/shop1_142_top_586618.jpg" alt="Product" class="w-full h-full object-cover"></div>
                <div class="text-center"><h2 class="text-[11px] uppercase tracking-wider mb-1">Namsan Chair</h2><p class="text-[10px] text-gray-500 tracking-tighter">Solid Wood / Traditional Craft</p></div>
            </div>
            <div class="product-card cursor-pointer group">
                <div class="aspect-[4/5] bg-gray-100 mb-4 overflow-hidden"><img src="https://m.en.eastern-edition.com/web/upload/category/shop1_142_top_586618.jpg" alt="Product" class="w-full h-full object-cover grayscale"></div>
                <div class="text-center"><h2 class="text-[11px] uppercase tracking-wider mb-1">Hanok Table</h2><p class="text-[10px] text-gray-500 tracking-tighter">Bespoke Series</p></div>
            </div>
        </div>
    </main>
</body>
</html>
